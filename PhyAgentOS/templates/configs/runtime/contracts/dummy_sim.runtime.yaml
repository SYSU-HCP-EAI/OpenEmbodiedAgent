version: runtime_target_contract_v1
target_id: dummy_sim
target_adapter: target_adapter://dummy_sim_adapter
observation:
  schema_source: sensor_config_ref
  require_describe_observation_schema: false
  allow_extra_channels: true
  timestamp_required: false
action_contract:
  id: dummy_delta_eef_gripper_v1
  accepted_representations:
    - delta_eef_pose_gripper
  shape:
    - T
    - 7
  dtype: float32
  normalized: false
  frame: base
  control_mode: cartesian_delta_position
  control_hz: 20
  components:
    - {name: dx, unit: meter}
    - {name: dy, unit: meter}
    - {name: dz, unit: meter}
    - {name: droll, unit: rad}
    - {name: dpitch, unit: rad}
    - {name: dyaw, unit: rad}
    - {name: gripper, unit: normalized}
  chunk:
    max_chunk_size: 50
    preferred_chunk_size: 50
    preferred_replan_after_steps: 5
    switch_policy: hard_switch
safety:
  require_target_side_validation: true
  stop_on_nan: true
  stop_on_timeout: true
capabilities:
  available_bridges:
    - bridge://safety_clamp
  tf_frames:
    - base
